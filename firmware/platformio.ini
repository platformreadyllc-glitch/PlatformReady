[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -Wno-cpp
upload_port = COM3
lib_deps =
    khoih-prog/Ethernet_Generic@^2.8.1
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.1
    olikraus/U8g2@^2.36.5
    arduino-libraries/ArduinoHttpClient@^0.6.1
